tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: markdown
              display: Content
              localizable: true
            handle: content
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              required: true
              validate:
                - required
                - 'max:200'
            handle: slug
title: 'Newsletter Audience'
