tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              width: 100
              display: 'Belongs To'
              default: SenorRita
              instructions: 'Derived from the blueprint/template mapping for editor clarity.'
              read_only: true
              listable: false
            handle: belongs_to
          -
            field:
              type: text
              width: 100
              display: 'Subject Line'
              listable: true
              validate: required
              instructions: 'The email subject line shown in the inbox.'
            handle: subject
          -
            field:
              type: text
              width: 100
              display: Preheader
              instructions: 'Short preview text after the subject in most inboxes (50–90 chars).'
            handle: preheader
          -
            field:
              type: assets
              width: 100
              display: 'Hero Image'
              restrict: false
              container: assets
              max_files: 1
              allow_uploads: true
            handle: hero_image
  editorial:
    display: Editorial
    sections:
      -
        display: Body
        fields:
          -
            field:
              type: bard
              width: 100
              buttons:
                - h2
                - h3
                - bold
                - italic
                - underline
                - unorderedlist
                - orderedlist
                - quote
                - anchor
                - image
              display: Content
              validate: required
              save_html: true
            handle: content
      -
        fields:
          -
            field:
              type: text
              width: 100
              default: emails.insight.senorrita
              display: 'Email Template'
              listable: false
              visibility: hidden
            handle: template
  rss_1:
    display: 'RSS 1'
    sections:
      -
        display: Source
        fields:
          -
            field:
              type: text
              width: 100
              display: 'RSS 1 Feed URL'
              instructions: 'Primary RSS source for SenorRita. This feed populates the lead story and the reorderable story list.'
            handle: rss_feed_url
          -
            field:
              type: integer
              width: 50
              default: 6
              display: 'RSS 1 Item Limit'
              instructions: 'How many stories to fetch from the primary RSS feed for this newsletter issue.'
            handle: rss_item_limit
          -
            field:
              type: toggle
              width: 50
              default: false
              display: 'Refresh RSS 1 Stories On Save'
              instructions: 'Turn on to repopulate the primary story list from RSS 1 the next time this entry is saved.'
            handle: refresh_rss_items
      -
        display: Stories
        fields:
          -
            field:
              type: replicator
              collapse: true
              previews: true
              sets:
                story:
                  display: Story
                  fields:
                    -
                      field:
                        type: toggle
                        width: 25
                        display: 'Lead Story'
                        replicator_preview: false
                      handle: is_lead
                    -
                      field:
                        type: text
                        width: 100
                        display: Title
                      handle: title
                    -
                      field:
                        type: text
                        width: 100
                        display: URL
                        replicator_preview: false
                      handle: url
                    -
                      field:
                        type: text
                        width: 100
                        display: 'Image URL'
                        replicator_preview: false
                      handle: image_url
                    -
                      field:
                        type: textarea
                        width: 100
                        display: Excerpt
                        replicator_preview: false
                      handle: excerpt
                    -
                      field:
                        type: text
                        width: 50
                        display: Author
                        replicator_preview: false
                      handle: author
                    -
                      field:
                        type: text
                        width: 50
                        display: 'Published Label'
                        replicator_preview: false
                      handle: published_label
                    -
                      field:
                        type: text
                        width: 50
                        display: Category
                        replicator_preview: false
                      handle: primary_taxonomy_title
              display: 'RSS 1 Stories'
              fullscreen: true
              instructions: 'Fetched primary stories appear here. Reorder rows to control newsletter order and toggle one row as the lead story.'
            handle: rss_items
  rss_2:
    display: 'RSS 2'
    sections:
      -
        display: Source
        fields:
          -
            field:
              type: text
              width: 100
              display: 'RSS 2 Feed URL'
              instructions: 'Related articles feed across Dataphyte newsletters.'
            handle: related_rss_feed_url
          -
            field:
              type: integer
              width: 50
              default: 4
              display: 'RSS 2 Item Limit'
              instructions: 'How many related articles to fetch from RSS 2.'
            handle: related_rss_item_limit
          -
            field:
              type: toggle
              width: 50
              default: false
              display: 'Refresh RSS 2 Stories On Save'
              instructions: 'Turn on to repopulate the RSS 2 story list the next time this entry is saved.'
            handle: refresh_related_rss_items
      -
        display: Stories
        fields:
          -
            field:
              type: replicator
              collapse: true
              previews: true
              sets:
                story:
                  display: Story
                  fields:
                    -
                      field:
                        type: text
                        width: 100
                        display: Title
                      handle: title
                    -
                      field:
                        type: text
                        width: 100
                        display: URL
                        replicator_preview: false
                      handle: url
                    -
                      field:
                        type: text
                        width: 100
                        display: 'Image URL'
                        replicator_preview: false
                      handle: image_url
                    -
                      field:
                        type: textarea
                        width: 100
                        display: Excerpt
                        replicator_preview: false
                      handle: excerpt
                    -
                      field:
                        type: text
                        width: 50
                        display: Author
                        replicator_preview: false
                      handle: author
                    -
                      field:
                        type: text
                        width: 50
                        display: 'Published Label'
                        replicator_preview: false
                      handle: published_label
                    -
                      field:
                        type: text
                        width: 50
                        display: Category
                        replicator_preview: false
                      handle: primary_taxonomy_title
              display: 'RSS 2 Stories'
              fullscreen: true
              instructions: 'Fetched RSS 2 stories appear here for review before send.'
            handle: related_rss_items
  rss_3:
    display: 'RSS 3'
    sections:
      -
        display: Source
        fields:
          -
            field:
              type: text
              width: 100
              display: 'RSS 3 Feed URL'
              instructions: 'Recommended reads feed for trending socio-economic issues.'
            handle: recommended_rss_feed_url
          -
            field:
              type: integer
              width: 50
              default: 4
              display: 'RSS 3 Item Limit'
              instructions: 'How many recommended stories to fetch from RSS 3.'
            handle: recommended_rss_item_limit
          -
            field:
              type: toggle
              width: 50
              default: false
              display: 'Refresh RSS 3 Stories On Save'
              instructions: 'Turn on to repopulate the RSS 3 story list the next time this entry is saved.'
            handle: refresh_recommended_rss_items
      -
        display: Stories
        fields:
          -
            field:
              type: replicator
              collapse: true
              previews: true
              sets:
                story:
                  display: Story
                  fields:
                    -
                      field:
                        type: text
                        width: 100
                        display: Title
                      handle: title
                    -
                      field:
                        type: text
                        width: 100
                        display: URL
                        replicator_preview: false
                      handle: url
                    -
                      field:
                        type: text
                        width: 100
                        display: 'Image URL'
                        replicator_preview: false
                      handle: image_url
                    -
                      field:
                        type: textarea
                        width: 100
                        display: Excerpt
                        replicator_preview: false
                      handle: excerpt
                    -
                      field:
                        type: text
                        width: 50
                        display: Author
                        replicator_preview: false
                      handle: author
                    -
                      field:
                        type: text
                        width: 50
                        display: 'Published Label'
                        replicator_preview: false
                      handle: published_label
                    -
                      field:
                        type: text
                        width: 50
                        display: Category
                        replicator_preview: false
                      handle: primary_taxonomy_title
              display: 'RSS 3 Stories'
              fullscreen: true
              instructions: 'Fetched RSS 3 stories appear here for review before send.'
            handle: recommended_rss_items
  sidebar:
    display: Settings
    sections:
      -
        fields:
          -
            field:
              mode: select
              type: terms
              width: 100
              display: 'Send To (Audiences)'
              taxonomies:
                - newsletter_audiences
              instructions: 'Select the sub-groups that will receive this newsletter.'
            handle: audiences
          -
            field:
              type: toggle
              width: 100
              default: false
              display: 'Send to All'
              instructions: 'Override audience selection and send to every subscriber in this group.'
            handle: send_to_all
          -
            field:
              type: text
              width: 100
              display: 'Author / Byline'
            handle: author
          -
            field:
              type: text
              width: 100
              display: 'Reply-To (override)'
              input_type: email
              instructions: 'Leave blank to use the collection default.'
            handle: reply_to
title: SenorRita
